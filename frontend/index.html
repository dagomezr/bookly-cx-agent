<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookly Support</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 480px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      height: 640px;
    }

    .chat-header {
      background: #1a1a2e;
      color: white;
      padding: 16px 20px;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .avatar {
      background: #e94560;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .chat-header .info .name { font-weight: 600; font-size: 15px; }
    .chat-header .info .status { font-size: 12px; color: #a0aec0; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.agent {
      background: #f0f4ff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .message.agent p { margin-bottom: 6px; }
    .message.agent p:last-child { margin-bottom: 0; }
    .message.agent strong { font-weight: 600; }
    .message.agent em { font-style: italic; }

    .message.agent table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 8px;
      font-size: 13px;
    }

    .message.agent th {
      background: #1a1a2e;
      color: white;
      padding: 6px 10px;
      text-align: left;
    }

    .message.agent td {
      padding: 6px 10px;
      border-bottom: 1px solid #e2e8f0;
    }

    .message.agent tr:last-child td { border-bottom: none; }
    .message.agent tr:nth-child(even) td { background: #f8faff; }

    .message.agent ul, .message.agent ol {
      padding-left: 18px;
      margin-top: 4px;
    }

    .message.agent li { margin-bottom: 2px; }

    .message.user {
      background: #1a1a2e;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .message.user img {
      display: block;
      max-width: 220px;
      border-radius: 8px;
      margin-top: 6px;
    }

    .message.typing {
      background: #f0f4ff;
      color: #999;
      align-self: flex-start;
      font-style: italic;
    }

    /* Image preview above input */
    .image-preview-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #f8faff;
      border-top: 1px solid #e2e8f0;
    }

    .image-preview-bar.visible { display: flex; }

    .image-preview-bar img {
      height: 48px;
      width: 48px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }

    .image-preview-bar span {
      flex: 1;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .image-preview-bar button {
      background: none;
      border: none;
      color: #e94560;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    /* Input row */
    .chat-input {
      display: flex;
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      gap: 10px;
      align-items: center;
    }

    .upload-btn {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 9px 11px;
      cursor: pointer;
      font-size: 18px;
      color: #888;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .upload-btn:hover { border-color: #1a1a2e; color: #1a1a2e; }

    .chat-input input[type="text"] {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input input[type="text"]:focus { border-color: #1a1a2e; }

    .chat-input button#sendBtn {
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .chat-input button#sendBtn:hover { background: #c73652; }
    .chat-input button#sendBtn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">

    <div class="chat-header">
      <div class="avatar">📚</div>
      <div class="info">
        <div class="name">Bookly Support</div>
        <div class="status">AI Assistant • Always here to help</div>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message agent">
        Hi! I'm Bookly's support assistant. I can help you with order status, returns, refunds, and general questions. How can I help you today?
      </div>
    </div>

    <!-- Image preview bar (shown when image is selected) -->
    <div class="image-preview-bar" id="previewBar">
      <img id="previewThumb" src="" alt="preview" />
      <span id="previewName"></span>
      <button onclick="clearImage()" title="Remove image">✕</button>
    </div>

    <div class="chat-input">
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)" />
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="Attach a photo">📎</button>
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const previewBar = document.getElementById("previewBar");
    const previewThumb = document.getElementById("previewThumb");
    const previewName = document.getElementById("previewName");

    marked.setOptions({ breaks: true });

    let history = [];
    let pendingImage = null; // { base64, mediaType, dataUrl, name }

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    function handleImageSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target.result;
        const [header, base64] = dataUrl.split(",");
        const mediaType = header.match(/:(.*?);/)[1];

        pendingImage = { base64, mediaType, dataUrl, name: file.name };

        previewThumb.src = dataUrl;
        previewName.textContent = file.name;
        previewBar.classList.add("visible");
      };
      reader.readAsDataURL(file);
      event.target.value = ""; // reset so same file can be reselected
    }

    function clearImage() {
      pendingImage = null;
      previewBar.classList.remove("visible");
      previewThumb.src = "";
      previewName.textContent = "";
    }

    function appendMessage(text, role, imageDataUrl = null) {
      const div = document.createElement("div");
      div.className = `message ${role}`;

      if (imageDataUrl) {
        const img = document.createElement("img");
        img.src = imageDataUrl;
        div.appendChild(img);
      }

      if (text) {
        if (role === "agent") {
          const content = document.createElement("div");
          content.innerHTML = marked.parse(text);
          div.appendChild(content);
        } else {
          if (text) {
            const span = document.createElement("span");
            span.textContent = text;
            div.appendChild(span);
          }
        }
      }

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text && !pendingImage) return;

      inputEl.value = "";
      sendBtn.disabled = true;

      const imageToSend = pendingImage;
      clearImage();

      // Show user message with optional image
      appendMessage(text, "user", imageToSend?.dataUrl);

      // Build history entry
      if (imageToSend) {
        history.push({
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: imageToSend.mediaType, data: imageToSend.base64 } },
            { type: "text", text: text || "Here is a photo." }
          ]
        });
      } else {
        history.push({ role: "user", content: text });
      }

      const typing = appendMessage("Bookly is typing...", "typing");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text || "Here is a photo.",
            history: history,
            image: imageToSend ? { base64: imageToSend.base64, media_type: imageToSend.mediaType } : null
          })
        });

        const data = await res.json();
        typing.remove();

        appendMessage(data.response, "agent");
        history.push({ role: "assistant", content: data.response });

      } catch (err) {
        typing.remove();
        appendMessage("Sorry, something went wrong. Please try again.", "agent");
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
